name: Hub CI

on:
  pull_request:
    branches: [main]
  pull_request_target:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: hub-${{ github.event_name == 'pull_request_target' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Content security lint (no secrets, safe for forks) ──────────────
  lint:
    name: Content security lint (13 checks)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Content security lint
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python .github/scripts/hub-lint.py

  # ── Guard scan with trusted scanner (needs SOVRAINE_PAT) ───────────
  scan:
    name: Guard scan (Grade A)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target' || github.event_name == 'push'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: pr

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: Sovraine/open-guard
          ref: main
          token: ${{ secrets.SOVRAINE_PAT }}
          path: scanner-src

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      # scanner-src/ is trusted (open-guard:main). Never replace with pr/.
      - name: Install trusted scanner
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install scanner-src/

      - name: Guard scan
        working-directory: pr
        run: |
          source ../.venv/bin/activate
          guard scan . --format text 2>&1 | tee /tmp/hub-scan-report.txt

      - name: Verify grade A
        run: |
          grade=$(grep -oP 'Grade: \K[A-F]' /tmp/hub-scan-report.txt | head -1)
          if [ -z "$grade" ]; then
            echo "::error::No grade found in scan output"
            exit 1
          fi
          echo "Hub scan grade: $grade"
          if [ "$grade" != "A" ]; then
            echo "::error::Grade $grade — grade A required for merge"
            exit 1
          fi

      - name: Save PR number
        if: github.event_name == 'pull_request_target'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: echo "${PR_NUMBER}" > pr-number.txt

      - name: Upload scan results
        if: github.event_name == 'pull_request_target'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hub-scan-results
          path: |
            /tmp/hub-scan-report.txt
            pr-number.txt
          retention-days: 1

      - name: Post scan report
        if: >-
          always()
          && github.event_name == 'pull_request_target'
          && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            let report = 'No scan report available.';
            try {
              report = fs.readFileSync('/tmp/hub-scan-report.txt', 'utf8');
            } catch (e) {}
            const truncated = report.length > 60000
              ? report.substring(0, 60000) + '\n\n... (truncated)'
              : report;
            const sanitized = truncated.replace(/`{3,}/g, (m) => '`'.repeat(2));
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Hub Scan Report\n\n\`\`\`\`\n${sanitized}\n\`\`\`\`\n\n> Scanned with trusted scanner from \`open-guard:main\`.`
            });

  # ── DCO sign-off (no secrets, safe for forks) ──────────────────────
  dco-check:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          errors=0
          for sha in $(git log --format='%H' "$base".."$head"); do
            author_email=$(git log -1 --format='%ae' "$sha")
            body=$(git log -1 --format='%B' "$sha")
            if ! echo "$body" | grep -q '^Signed-off-by:'; then
              echo "::error::Commit $sha missing Signed-off-by. Use: git commit -s"
              errors=$((errors + 1))
            elif ! echo "$body" | grep -q "^Signed-off-by:.*<${author_email}>"; then
              echo "::error::Commit $sha Signed-off-by email does not match author ($author_email)"
              errors=$((errors + 1))
            fi
          done
          exit $errors
