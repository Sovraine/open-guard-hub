<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#151d30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b5bdb"/>
      <stop offset="100%" stop-color="#5c7cfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1a2540" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- Title -->
  <text x="640" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#e8ecf4" letter-spacing="-1">OpenGuard Hub</text>

  <!-- Subtitle -->
  <text x="640" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#7b8db5">The governance layer between AI agents and the tools they call.</text>

  <!-- Stats row -->
  <g transform="translate(640, 340)">
    <!-- Verb count -->
    <g transform="translate(-380, 0)">
      <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="#5c7cfa" filter="url(#glow)">676</text>
      <text x="0" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#4a5a80" letter-spacing="2">VERBS</text>
    </g>
    <!-- Separator -->
    <line x1="-230" y1="-25" x2="-230" y2="35" stroke="#1e2a4a" stroke-width="1"/>
    <!-- Mappings -->
    <g transform="translate(-120, 0)">
      <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="#5c7cfa" filter="url(#glow)">104</text>
      <text x="0" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#4a5a80" letter-spacing="2">MCP MAPPINGS</text>
    </g>
    <line x1="30" y1="-25" x2="30" y2="35" stroke="#1e2a4a" stroke-width="1"/>
    <!-- Policies -->
    <g transform="translate(160, 0)">
      <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="#5c7cfa" filter="url(#glow)">63</text>
      <text x="0" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#4a5a80" letter-spacing="2">POLICIES</text>
    </g>
    <line x1="270" y1="-25" x2="270" y2="35" stroke="#1e2a4a" stroke-width="1"/>
    <!-- Sectors -->
    <g transform="translate(370, 0)">
      <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="#5c7cfa" filter="url(#glow)">18</text>
      <text x="0" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#4a5a80" letter-spacing="2">SECTORS</text>
    </g>
  </g>

  <!-- Cascade preview -->
  <g transform="translate(640, 440)" opacity="0.7">
    <rect x="-340" y="0" width="120" height="32" rx="6" fill="#1a2540" stroke="#2a3a5c" stroke-width="1"/>
    <text x="-280" y="21" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#6b7fa0">Agent Call</text>

    <text x="-210" y="21" font-family="system-ui, sans-serif" font-size="16" fill="#2a3a5c">--></text>

    <rect x="-190" y="0" width="120" height="32" rx="6" fill="#1a2540" stroke="#2a3a5c" stroke-width="1"/>
    <text x="-130" y="21" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#6b7fa0">Mapping</text>

    <text x="-60" y="21" font-family="system-ui, sans-serif" font-size="16" fill="#2a3a5c">--></text>

    <rect x="-40" y="0" width="120" height="32" rx="6" fill="#1a2540" stroke="#2a3a5c" stroke-width="1"/>
    <text x="20" y="21" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#6b7fa0">Policy</text>

    <text x="90" y="21" font-family="system-ui, sans-serif" font-size="16" fill="#2a3a5c">--></text>

    <rect x="110" y="0" width="120" height="32" rx="6" fill="#1e1515" stroke="#5a2020" stroke-width="1"/>
    <text x="170" y="21" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#f06060">DENY</text>

    <text x="250" y="21" font-family="system-ui, sans-serif" font-size="16" fill="#2a3a5c">--></text>

    <rect x="270" y="0" width="74" height="32" rx="6" fill="#1a2540" stroke="#2a3a5c" stroke-width="1"/>
    <text x="307" y="21" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#6b7fa0">Audit</text>
  </g>

  <!-- Footer -->
  <text x="640" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#3a4a6a">CC-BY-SA-4.0  |  sovraine.io</text>

  <!-- Sovraine wordmark bottom-right -->
  <text x="1240" y="610" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#2a3a5c" letter-spacing="3">SOVRAINE</text>
</svg>
