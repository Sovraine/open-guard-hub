<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2340"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="deny" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b1a1a"/>
      <stop offset="100%" stop-color="#2d1515"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" rx="12" fill="url(#bg)"/>
  <rect width="720" height="520" rx="12" stroke="#2a3a5c" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#8b9cc7" letter-spacing="2">HOW IT WORKS</text>

  <!-- Step 1: Agent Call -->
  <rect x="160" y="56" width="400" height="64" rx="8" fill="url(#card)" stroke="#2e4070" stroke-width="1"/>
  <text x="180" y="80" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#5b7fdb" letter-spacing="1">AI AGENT</text>
  <text x="180" y="104" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#c4d0ec">stripe.delete_customer</text>
  <text x="440" y="104" font-family="ui-monospace, monospace" font-size="11" fill="#4a5a80">tool call</text>

  <!-- Arrow 1 -->
  <line x1="360" y1="120" x2="360" y2="152" stroke="#3a5090" stroke-width="2"/>
  <polygon points="354,148 360,158 366,148" fill="#3a5090"/>

  <!-- Step 2: Mapping -->
  <rect x="160" y="158" width="400" height="80" rx="8" fill="url(#card)" stroke="#2e4070" stroke-width="1"/>
  <text x="180" y="182" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#5b7fdb" letter-spacing="1">MAPPING</text>
  <text x="540" y="182" text-anchor="end" font-family="ui-monospace, monospace" font-size="10" fill="#3d5080">stripe.mapping.yaml</text>
  <text x="180" y="206" font-family="ui-monospace, monospace" font-size="13" fill="#c4d0ec">delete_customer</text>
  <text x="340" y="206" font-family="system-ui, sans-serif" font-size="13" fill="#4a6a9a">-></text>
  <text x="370" y="206" font-family="ui-monospace, monospace" font-size="13" fill="#7eb8f0" font-weight="600">delete</text>
  <rect x="180" y="216" width="56" height="18" rx="4" fill="#2a1a10" stroke="#8b6020" stroke-width="1"/>
  <text x="208" y="229" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#e8a030">HIGH</text>

  <!-- Arrow 2 -->
  <line x1="360" y1="238" x2="360" y2="270" stroke="#3a5090" stroke-width="2"/>
  <polygon points="354,266 360,276 366,266" fill="#3a5090"/>

  <!-- Step 3: Policy -->
  <rect x="160" y="276" width="400" height="80" rx="8" fill="url(#card)" stroke="#2e4070" stroke-width="1"/>
  <text x="180" y="300" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#5b7fdb" letter-spacing="1">POLICY</text>
  <text x="540" y="300" text-anchor="end" font-family="ui-monospace, monospace" font-size="10" fill="#3d5080">no-delete-prod.guard.md</text>
  <text x="180" y="324" font-family="ui-monospace, monospace" font-size="12" fill="#8898b8">match: [delete]</text>
  <text x="340" y="324" font-family="system-ui, sans-serif" font-size="13" fill="#4a6a9a">-></text>
  <text x="370" y="324" font-family="ui-monospace, monospace" font-size="13" fill="#f07070" font-weight="600">DENY</text>
  <text x="180" y="346" font-family="ui-monospace, monospace" font-size="11" fill="#4a5a80">severity: HIGH  priority: 85</text>

  <!-- Arrow 3 -->
  <line x1="360" y1="356" x2="360" y2="388" stroke="#3a5090" stroke-width="2"/>
  <polygon points="354,384 360,394 366,384" fill="#3a5090"/>

  <!-- Step 4: Verdict -->
  <rect x="160" y="394" width="400" height="72" rx="8" fill="url(#deny)" stroke="#5a2020" stroke-width="1.5"/>
  <rect x="180" y="410" width="52" height="20" rx="4" fill="#5a1515"/>
  <text x="206" y="424" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f06060" filter="url(#glow)">DENY</text>
  <text x="244" y="424" font-family="system-ui, sans-serif" font-size="13" fill="#d0a0a0">Action blocked before execution</text>
  <text x="180" y="450" font-family="ui-monospace, monospace" font-size="11" fill="#6a4a4a">audit: hash-chained record created</text>

  <!-- Side labels -->
  <text x="140" y="92" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#3a4a6a">1</text>
  <text x="140" y="202" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#3a4a6a">2</text>
  <text x="140" y="320" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#3a4a6a">3</text>
  <text x="140" y="430" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#3a4a6a">4</text>

  <!-- Footer -->
  <text x="360" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3a4a6a">Every action evaluated. Every verdict audited. Before execution.</text>
</svg>
