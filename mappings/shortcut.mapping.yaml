server: shortcut
description: "Shortcut — stories, iterations, epics, objectives, teams, workflows (55 tools)"
version: 1.0.0
license: CC-BY-SA-4.0
upstream:
  package: "@anthropic-ai/shortcut-mcp-server"
  registry: npm
  transport: stdio
  command: "npx -y @anthropic-ai/shortcut-mcp-server"
tools:
  # --- Stories ---
  list_stories:
    action: list
    risk: READ-ONLY
    description: "List stories"
  get_story:
    action: read
    risk: READ-ONLY
    description: "Get story details"
    target_from: story_id
  create_story:
    action: create
    risk: LOW
    description: "Create a new story"
    target_from: name
  update_story:
    action: update
    risk: LOW
    description: "Update a story"
    target_from: story_id
  delete_story:
    action: delete
    risk: MEDIUM
    description: "Delete a story"
    target_from: story_id
  search_stories:
    action: search
    risk: READ-ONLY
    description: "Search stories with query"
    sql_mapping: false
    target_from: query
  move_story:
    action: update
    risk: LOW
    description: "Move a story to a different state"
    target_from: story_id
  add_story_comment:
    action: create
    risk: LOW
    description: "Add a comment to a story"
    target_from: story_id
  list_story_comments:
    action: list
    risk: READ-ONLY
    description: "List comments on a story"
    target_from: story_id
  update_story_comment:
    action: update
    risk: LOW
    description: "Update a story comment"
    target_from: comment_id
    context_from:
      story_id: story_id
  delete_story_comment:
    action: delete
    risk: MEDIUM
    description: "Delete a story comment"
    target_from: comment_id
    context_from:
      story_id: story_id
  add_story_task:
    action: create
    risk: LOW
    description: "Add a task to a story"
    target_from: story_id
  update_story_task:
    action: update
    risk: LOW
    description: "Update a story task"
    target_from: task_id
    context_from:
      story_id: story_id
  delete_story_task:
    action: delete
    risk: MEDIUM
    description: "Delete a story task"
    target_from: task_id
    context_from:
      story_id: story_id
  link_stories:
    action: create
    risk: LOW
    description: "Create a link between stories"
    target_from: subject_id
    context_from:
      object_id: object_id
  # --- Iterations ---
  list_iterations:
    action: list
    risk: READ-ONLY
    description: "List iterations"
  get_iteration:
    action: read
    risk: READ-ONLY
    description: "Get iteration details"
    target_from: iteration_id
  create_iteration:
    action: create
    risk: LOW
    description: "Create a new iteration"
    target_from: name
  update_iteration:
    action: update
    risk: LOW
    description: "Update an iteration"
    target_from: iteration_id
  delete_iteration:
    action: delete
    risk: MEDIUM
    description: "Delete an iteration"
    target_from: iteration_id
  list_iteration_stories:
    action: list
    risk: READ-ONLY
    description: "List stories in an iteration"
    target_from: iteration_id
  # --- Epics ---
  list_epics:
    action: list
    risk: READ-ONLY
    description: "List epics"
