  delete_epic:
    action: delete
    risk: MEDIUM
    description: "Delete an epic"
    target_from: epic_id
  list_epic_stories:
    action: list
    risk: READ-ONLY
    description: "List stories in an epic"
    target_from: epic_id
  add_epic_comment:
