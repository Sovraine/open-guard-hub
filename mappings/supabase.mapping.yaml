server: supabase
description: "Supabase — project management, database, edge functions (29 tools)"
version: 1.0.0
license: CC-BY-SA-4.0
upstream:
  package: "@supabase/mcp-server-supabase"
  registry: npm
  transport: stdio
  command: "npx -y @supabase/mcp-server-supabase"
tools:
  # --- Account ---
  list_organizations:
    action: list
    risk: READ-ONLY
    description: "List all organizations"
  get_organization:
    action: read
    risk: READ-ONLY
    description: "Get organization details"
    target_from: id
  list_projects:
    action: list
    risk: READ-ONLY
    description: "List all Supabase projects"
  get_project:
    action: read
    risk: READ-ONLY
    description: "Get project details"
    target_from: id
  get_cost:
    action: read
    risk: READ-ONLY
    description: "Get cost of creating a project or branch"
    target_from: type
    context_from:
      organization_id: organization_id
  confirm_cost:
    action: read
    risk: READ-ONLY
    description: "Confirm cost understanding before creation"
    target_from: type
  create_project:
    action: create
    risk: HIGH
    description: "Create a new Supabase project"
    target_from: name
    context_from:
      organization_id: organization_id
      region: region
  pause_project:
    action: update
    risk: HIGH
    description: "Pause a Supabase project"
    target_from: project_id
  restore_project:
    action: update
    risk: MEDIUM
    description: "Restore a paused project"
    target_from: project_id
  # --- Branching ---
  create_branch:
    action: create
    risk: MEDIUM
    description: "Create a development branch"
    target_from: name
    context_from:
      project_id: project_id
  list_branches:
    action: list
    risk: READ-ONLY
    description: "List development branches"
    target_from: project_id
  delete_branch:
    action: delete
    risk: HIGH
    description: "Delete a development branch"
    target_from: branch_id
  merge_branch:
    action: update
    risk: HIGH
    description: "Merge branch migrations to production"
    target_from: branch_id
  reset_branch:
    action: update
    risk: HIGH
    description: "Reset branch migrations (data loss)"
    target_from: branch_id
  rebase_branch:
    action: update
    risk: MEDIUM
    description: "Rebase branch on production"
    target_from: branch_id
  # --- Database ---
  list_tables:
    action: list
    risk: READ-ONLY
    description: "List tables in schemas"
    target_from: project_id
  list_extensions:
    action: list
    risk: READ-ONLY
    description: "List database extensions"
    target_from: project_id
  list_migrations:
    action: list
    risk: READ-ONLY
    description: "List database migrations"
    target_from: project_id
  apply_migration:
    action: execute
    risk: HIGH
    description: "Apply a DDL migration"
    target_from: project_id
    context_from:
      name: name
      query: query
  execute_sql:
    action: _detect
    risk: CRITICAL
    parser: sql
    description: "Execute raw SQL in the database"
    sql_mapping:
      SELECT: read
      INSERT: create
      UPDATE: update
      DELETE: delete
      DROP: delete
      TRUNCATE: delete
      ALTER: update
      CREATE: create
      GRANT: update
      REVOKE: update
    target_from: project_id
    context_from:
      query: query
  # --- Debugging ---
  get_logs:
    action: read
    risk: READ-ONLY
    description: "Get project logs by service type"
    target_from: project_id
    context_from:
      service: service
  get_advisors:
    action: read
    risk: READ-ONLY
    description: "Get security or performance advisories"
    target_from: project_id
    context_from:
      type: type
  # --- Development ---
  get_project_url:
    action: read
    risk: READ-ONLY
    description: "Get the API URL for a project"
    target_from: project_id
  get_publishable_keys:
    action: read
    risk: READ-ONLY
    description: "Get publishable API keys"
    target_from: project_id
  generate_typescript_types:
    action: read
    risk: READ-ONLY
    description: "Generate TypeScript types from schema"
    target_from: project_id
  # --- Docs ---
  search_docs:
    action: search
    risk: READ-ONLY
    description: "Search Supabase documentation"
    sql_mapping: false
    target_from: graphql_query
  # --- Edge Functions ---
  list_edge_functions:
    action: list
    risk: READ-ONLY
    description: "List all Edge Functions"
    target_from: project_id
  get_edge_function:
    action: read
    risk: READ-ONLY
    description: "Get Edge Function source code"
    target_from: function_slug
    context_from:
      project_id: project_id
  deploy_edge_function:
    action: create
    risk: HIGH
    description: "Deploy an Edge Function"
    target_from: name
    context_from:
      project_id: project_id
