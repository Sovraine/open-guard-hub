server: atlassian-jira-server
description: "Atlassian Jira Server on-premise"
version: "1.0.0"
license: CC-BY-SA-4.0
upstream:
  package: "atlassian-jira-server-mcp"
  registry: npm
  transport: stdio

tools:
  list_projects:
    action: list
    risk: READ-ONLY
    description: "List projects"
  get_project:
    action: read
    risk: READ-ONLY
    description: "Get project"
    target_from: project_key
  create_issue:
    action: create
    risk: MEDIUM
    description: "Create issue"
    context_from:
      project_key: project_key
      summary: summary
      type: type
  get_issue:
    action: read
    risk: READ-ONLY
    description: "Get issue"
    target_from: issue_key
  update_issue:
    action: update
    risk: MEDIUM
    description: "Update issue"
    target_from: issue_key
    context_from:
      fields: fields
  delete_issue:
    action: delete
    risk: HIGH
    description: "Delete issue"
    target_from: issue_key
  add_comment:
    action: create
    risk: LOW
    description: "Add comment"
    target_from: issue_key
    context_from:
      body: body
  list_boards:
    action: list
    risk: READ-ONLY
    description: "List boards"
  get_board:
    action: read
    risk: READ-ONLY
    description: "Get board"
    target_from: board_id
  list_sprints:
    action: list
    risk: READ-ONLY
    description: "List sprints"
    target_from: board_id
