server: amplitude
description: "Amplitude product analytics and insights"
version: "1.0.0"
license: CC-BY-SA-4.0
upstream:
  package: "amplitude-mcp"
  registry: npm
  transport: stdio

tools:
  track_event:
    action: create
    risk: LOW
    description: "Track event"
    context_from:
      user_id: user_id
      event_type: event_type
      event_properties: event_properties
  get_user:
    action: read
    risk: READ-ONLY
    description: "Get user"
    target_from: user_id
  set_user_properties:
    action: update
    risk: MEDIUM
    description: "Set user properties"
    target_from: user_id
    context_from:
      user_properties: user_properties
  get_events:
    action: list
    risk: READ-ONLY
    description: "Get events"
    context_from:
      user_id: user_id
      limit: limit
  query_events:
    action: search
    risk: READ-ONLY
    description: "Query events"
    context_from:
      query: query
  create_segment:
    action: create
    risk: MEDIUM
    description: "Create segment"
    target_from: segment_name
    context_from:
      definition: definition
  delete_segment:
    action: delete
    risk: MEDIUM
    description: "Delete segment"
    target_from: segment_id
  list_segments:
    action: list
    risk: READ-ONLY
    description: "List segments"
