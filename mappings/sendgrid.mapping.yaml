server: sendgrid
description: "SendGrid email delivery and marketing"
version: "1.0.0"
license: CC-BY-SA-4.0
upstream:
  package: "sendgrid-mcp"
  registry: npm
  transport: stdio

tools:
  list_contacts:
    action: list
    risk: READ-ONLY
    description: "List contacts"
  get_contact:
    action: read
    risk: READ-ONLY
    description: "Get contact details"
    target_from: contact_id
  create_contact:
    action: create
    risk: MEDIUM
    description: "Create contact"
    context_from:
      email: email
      first_name: first_name
  update_contact:
    action: update
    risk: MEDIUM
    description: "Update contact"
    target_from: contact_id
    context_from:
      fields: fields
  delete_contact:
    action: delete
    risk: HIGH
    description: "Delete contact"
    target_from: contact_id
  send_email:
    action: create
    risk: LOW
    description: "Send email"
    context_from:
      to: to
      subject: subject
      body: body
  schedule_email:
    action: schedule
    risk: LOW
    description: "Schedule email"
    context_from:
      to: to
      subject: subject
      send_at: send_at
  list_templates:
    action: list
    risk: READ-ONLY
    description: "List email templates"
  get_template:
    action: read
    risk: READ-ONLY
    description: "Get template"
    target_from: template_id
  create_template:
    action: create
    risk: MEDIUM
    description: "Create template"
    context_from:
      name: name
      subject: subject
      html_content: html_content
  delete_template:
    action: delete
    risk: HIGH
    description: "Delete template"
    target_from: template_id
  list_campaigns:
    action: list
    risk: READ-ONLY
    description: "List campaigns"
  get_campaign:
    action: read
    risk: READ-ONLY
    description: "Get campaign"
    target_from: campaign_id
  create_campaign:
    action: create
    risk: MEDIUM
    description: "Create campaign"
    context_from:
      title: title
      subject: subject
      template_id: template_id
  send_campaign:
    action: execute
    risk: HIGH
    description: "Send campaign"
    target_from: campaign_id
  list_lists:
    action: list
    risk: READ-ONLY
    description: "List contact lists"
  create_list:
    action: create
    risk: MEDIUM
    description: "Create list"
    target_from: list_name
  delete_list:
    action: delete
    risk: HIGH
    description: "Delete list"
    target_from: list_id
  add_contact_to_list:
    action: create
    risk: MEDIUM
    description: "Add contact to list"
    target_from: list_id
    context_from:
      contact_id: contact_id
  remove_contact_from_list:
    action: delete
    risk: HIGH
    description: "Remove contact from list"
    target_from: list_id
    context_from:
      contact_id: contact_id
