server: firebase
description: "Firebase backend services"
version: "1.0.0"
license: CC-BY-SA-4.0
upstream:
  package: "firebase-mcp"
  registry: npm
  transport: stdio

tools:
  list_projects:
    action: list
    risk: READ-ONLY
    description: "List Firebase projects"
  get_project:
    action: read
    risk: READ-ONLY
    description: "Get project details"
    target_from: project_id
  create_project:
    action: create
    risk: MEDIUM
    description: "Create project"
    target_from: project_name
  delete_project:
    action: delete
    risk: CRITICAL
    description: "Delete project"
    target_from: project_id
  list_databases:
    action: list
    risk: READ-ONLY
    description: "List Firestore databases"
    target_from: project_id
  create_database:
    action: create
    risk: MEDIUM
    description: "Create database"
    target_from: project_id
    context_from:
      database_name: database_name
  delete_database:
    action: delete
    risk: HIGH
    description: "Delete database"
    target_from: database_id
  get_document:
    action: read
    risk: READ-ONLY
    description: "Get document"
    target_from: collection_path
  list_documents:
    action: list
    risk: READ-ONLY
    description: "List documents"
    target_from: collection_path
  create_document:
    action: create
    risk: MEDIUM
    description: "Create document"
    target_from: collection_path
    context_from:
      data: data
  update_document:
    action: update
    risk: MEDIUM
    description: "Update document"
    target_from: document_path
    context_from:
      data: data
  delete_document:
    action: delete
    risk: MEDIUM
    description: "Delete document"
    target_from: document_path
  query_documents:
    action: search
    risk: READ-ONLY
    description: "Query documents"
    target_from: collection_path
    context_from:
      query: query
  batch_write:
    action: execute
    risk: MEDIUM
    description: "Batch write operations"
    context_from:
      operations: operations
  create_collection:
    action: create
    risk: MEDIUM
    description: "Create collection"
    target_from: collection_path
  delete_collection:
    action: delete
    risk: HIGH
    description: "Delete collection"
    target_from: collection_path
  list_buckets:
    action: list
    risk: READ-ONLY
    description: "List storage buckets"
  create_bucket:
    action: create
    risk: MEDIUM
    description: "Create storage bucket"
    target_from: bucket_name
  delete_bucket:
    action: delete
    risk: HIGH
    description: "Delete bucket"
    target_from: bucket_id
  upload_file:
    action: create
    risk: MEDIUM
    description: "Upload file to storage"
    target_from: bucket_id
    context_from:
      file_path: file_path
  download_file:
    action: read
    risk: READ-ONLY
    description: "Download file from storage"
    target_from: file_path
  delete_file:
    action: delete
    risk: MEDIUM
    description: "Delete file"
    target_from: file_path
  list_auth_users:
    action: list
    risk: READ-ONLY
    description: "List auth users"
    target_from: project_id
  create_auth_user:
    action: create
    risk: MEDIUM
    description: "Create auth user"
    target_from: project_id
    context_from:
      email: email
      password: password
  delete_auth_user:
    action: delete
    risk: HIGH
    description: "Delete auth user"
    target_from: user_id
  update_auth_user:
    action: update
    risk: MEDIUM
    description: "Update auth user"
    target_from: user_id
    context_from:
      properties: properties
  send_custom_claims:
    action: update
    risk: HIGH
    description: "Set custom claims for user"
    target_from: user_id
    context_from:
      claims: claims
