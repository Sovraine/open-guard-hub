    risk: LOW
    description: "Archive multiple tasks"
  # --- Calls ---
  calls_create:
    action: create
    risk: LOW
    description: "Create a call record"
    target_from: properties
  calls_get:
    action: read
    risk: READ-ONLY
    description: "Get a call record"
    target_from: callId
  calls_update:
    action: update
    risk: LOW
    description: "Update a call record"
    target_from: callId
  calls_archive:
