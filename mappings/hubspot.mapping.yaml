  meetings_batch_create:
    action: create
    risk: MEDIUM
    description: "Create multiple meetings"
  meetings_batch_update:
    action: update
    risk: MEDIUM
    description: "Update multiple meetings"
  meetings_batch_archive:
    action: delete
    risk: MEDIUM
    target_from: inputs
    description: "Archive multiple meetings"
  # --- Notes ---
  notes_create:
    action: create
    risk: LOW
    description: "Create a note"
    target_from: properties
  notes_get:
