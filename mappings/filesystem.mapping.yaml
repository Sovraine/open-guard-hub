server: filesystem
description: "File system operations"
version: "1.0.0"
license: CC-BY-SA-4.0

tools:
  read_file:
    action: read
    target_from: path
    parser: params
  read_text_file:
    action: read
    target_from: path
    parser: params
  read_media_file:
    action: read
    target_from: path
    parser: params
  read_multiple_files:
    action: read
    target_from: paths
    parser: params
  write_file:
    action: update
    target_from: path
    parser: params
  edit_file:
    action: update
    target_from: path
    parser: params
  create_directory:
    action: create
    target_from: path
    parser: params
  list_directory:
    action: list
    target_from: path
    parser: params
  list_directory_with_sizes:
    action: list
    target_from: path
    parser: params
  directory_tree:
    action: list
    target_from: path
    parser: params
  get_file_info:
    action: read
    target_from: path
    parser: params
  list_allowed_directories:
    action: list
    target_from: null
    parser: params
  delete_file:
    action: delete
    target_from: path
    parser: params
  move_file:
    action: update
    target_from: source
