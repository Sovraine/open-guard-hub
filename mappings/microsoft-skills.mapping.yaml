server: microsoft-skills
description: MCP server mapping for microsoft-skills
version: 1.0.0
license: CC-BY-SA-4.0
upstream:
  package: microsoft-skills
  registry: npm
  transport: stdio
tools:
  backend_developer:
    action: execute
    risk: MEDIUM
    description: FastAPI/Python specialist for CoreAI DIY backend development with Pydantic, Cosmos DB, and Azure 
      services
  infrastructure_engineer:
    action: execute
    risk: MEDIUM
    description: Azure and Bicep specialist for CoreAI DIY infrastructure, deployments, and DevOps
  planner:
    action: execute
    risk: MEDIUM
    description: Read-only planning specialist that analyzes requirements, explores the codebase, and creates detailed 
      implementation plans before coding begins
  presenter_mode_developer:
    action: execute
    risk: MEDIUM
    description: Specialist for CoreAI DIY presenter mode features, including presentation view, navigation, and 
      teleprompter functionality
  frontend_developer:
    action: execute
    risk: MEDIUM
    description: React/TypeScript specialist for CoreAI DIY frontend development with React Flow, Zustand, and Tailwind 
      CSS
  project_scaffolder:
    action: execute
    risk: MEDIUM
    description: Full-stack Azure AI Foundry application scaffolder for React + FastAPI + azd projects
  wiki-vitepress:
    action: execute
    risk: MEDIUM
    description: Packages generated wiki Markdown into a VitePress static site with dark theme, dark-mode Mermaid 
      diagrams with click-to-zoom, and production build output. Use when the user wants to create a browsable website 
      from generated wiki pages.
  wiki-ado-convert:
    action: execute
    risk: MEDIUM
    description: Converts VitePress/GFM wiki markdown to Azure DevOps Wiki-compatible format. Generates a Node.js build 
      script that transforms Mermaid syntax, strips front matter, fixes links, and outputs ADO-compatible copies to 
      dist/ado-wiki/.
  wiki-page-writer:
    action: execute
    risk: MEDIUM
    description: Generates rich technical documentation pages with dark-mode Mermaid diagrams, source code citations, 
      and first-principles depth. Use when writing documentation, generating wiki pages, creating technical deep-dives, 
      or documenting specific components or systems.
  wiki-changelog:
    action: execute
    risk: MEDIUM
    description: Analyzes git commit history and generates structured changelogs categorized by change type. Use when 
      the user asks about recent changes, wants a changelog, or needs to understand what changed in the repository.
  wiki-onboarding:
    action: execute
    risk: MEDIUM
    description: Generates four audience-tailored onboarding guides in an onboarding/ folder — Contributor, Staff 
      Engineer, Executive, and Product Manager. Use when the user wants onboarding documentation for a codebase.
  wiki-llms-txt:
    action: execute
    risk: MEDIUM
    description: Generates llms.txt and llms-full.txt files for LLM-friendly project documentation following the 
      llms.txt specification. Use when the user wants to create LLM-readable summaries, llms.txt files, or make their 
      wiki accessible to language models.
  wiki-researcher:
    action: execute
    risk: MEDIUM
    description: Conducts multi-turn iterative deep research on specific topics within a codebase with zero tolerance 
      for shallow analysis. Use when the user wants an in-depth investigation, needs to understand how something works 
      across multiple files, or asks for comprehensive analysis of a specific system or pattern.
  wiki-architect:
    action: execute
    risk: MEDIUM
    description: Analyzes code repositories and generates hierarchical documentation structures with onboarding guides. 
      Use when the user wants to create a wiki, generate documentation, map a codebase structure, or understand a 
      project's architecture at a high level.
  wiki-qa:
    action: execute
    risk: MEDIUM
    description: Answers questions about a code repository using source file analysis. Use when the user asks a question
      about how something works, wants to understand a component, or needs help navigating the codebase.
  wiki-agents-md:
    action: execute
    risk: MEDIUM
    description: Generates AGENTS.md files for repository folders — coding agent context files with build commands, 
      testing instructions, code style, project structure, and boundaries. Only generates where AGENTS.md is missing.
  azure-monitor-opentelemetry-exporter-py:
    action: execute
    risk: MEDIUM
    description: "Azure Monitor OpenTelemetry Exporter for Python. Use for low-level OpenTelemetry export to Application Insights.\n\
      Triggers: \"azure-monitor-opentelemetry-exporter\", \"AzureMonitorTraceExporter\", \"AzureMonitorMetricExporter\", \"\
      AzureMonitorLogExporter\".\n"
  azure-ai-contentunderstanding-py:
    action: execute
    risk: MEDIUM
    description: "Azure AI Content Understanding SDK for Python. Use for multimodal content extraction from documents, images,
      audio, and video.\nTriggers: \"azure-ai-contentunderstanding\", \"ContentUnderstandingClient\", \"multimodal analysis\"\
      , \"document extraction\", \"video analysis\", \"audio transcription\".\n"
  azure-ai-ml-py:
    action: execute
    risk: MEDIUM
    description: "Azure Machine Learning SDK v2 for Python. Use for ML workspaces, jobs, models, datasets, compute, and pipelines.\n\
      Triggers: \"azure-ai-ml\", \"MLClient\", \"workspace\", \"model registry\", \"training jobs\", \"datasets\".\n"
  azure-identity-py:
    action: execute
    risk: MEDIUM
    description: "Azure Identity SDK for Python authentication with Microsoft Entra ID. Use for DefaultAzureCredential, managed
      identity, service principals, and token caching.\nTriggers: \"azure-identity\", \"DefaultAzureCredential\", \"authentication\"\
      , \"managed identity\", \"service principal\", \"credential\".\n"
  azure-messaging-webpubsubservice-py:
    action: execute
    risk: MEDIUM
    description: "Azure Web PubSub Service SDK for Python. Use for real-time messaging, WebSocket connections, and pub/sub
      patterns.\nTriggers: \"azure-messaging-webpubsubservice\", \"WebPubSubServiceClient\", \"real-time\", \"WebSocket\"\
      , \"pub/sub\".\n"
  azure-ai-textanalytics-py:
    action: execute
    risk: MEDIUM
    description: "Azure AI Text Analytics SDK for sentiment analysis, entity recognition, key phrases, language detection,
      PII, and healthcare NLP. Use for natural language processing on text.\nTriggers: \"text analytics\", \"sentiment analysis\"\
      , \"entity recognition\", \"key phrase\", \"PII detection\", \"TextAnalyticsClient\".\n"
  azure-speech-to-text-rest-py:
    action: execute
    risk: MEDIUM
    description: "Azure Speech to Text REST API for short audio (Python). Use for simple speech recognition of audio files
      up to 60 seconds without the Speech SDK.\nTriggers: \"speech to text REST\", \"short audio transcription\", \"speech
      recognition REST API\", \"STT REST\", \"recognize speech REST\".\nDO NOT USE FOR: Long audio (>60 seconds), real-time
      streaming, batch transcription, custom speech models, speech translation. Use Speech SDK or Batch Transcription API
      instead."
  azure-cosmos-db-py:
    action: execute
    risk: MEDIUM
    description: Build Azure Cosmos DB NoSQL services with Python/FastAPI following production-grade patterns. Use when 
      implementing database client setup with dual auth (DefaultAzureCredential + emulator), service layer classes with 
      CRUD operations, partition key strategies, parameterized queries, or TDD patterns for Cosmos. Triggers on phrases 
      like "Cosmos DB", "NoSQL database", "document store", "add persistence", "database service layer", or "Python 
      Cosmos SDK".
  azure-servicebus-py:
    action: execute
    risk: MEDIUM
    description: "Azure Service Bus SDK for Python messaging. Use for queues, topics, subscriptions, and enterprise messaging
      patterns.\nTriggers: \"service bus\", \"ServiceBusClient\", \"queue\", \"topic\", \"subscription\", \"message broker\"\
      .\n"
  azure-ai-voicelive-py:
    action: execute
    risk: MEDIUM
    description: Build real-time voice AI applications using Azure AI Voice Live SDK (azure-ai-voicelive). Use this 
      skill when creating Python applications that need real-time bidirectional audio communication with Azure AI, 
      including voice assistants, voice-enabled chatbots, real-time speech-to-speech translation, voice-driven avatars, 
      or any WebSocket-based audio streaming with AI models. Supports Server VAD (Voice Activity Detection), turn-based 
      conversation, function calling, MCP tools, avatar integration, and transcription.
  azure-mgmt-botservice-py:
    action: execute
    risk: MEDIUM
    description: "Azure Bot Service Management SDK for Python. Use for creating, managing, and configuring Azure Bot Service
      resources.\nTriggers: \"azure-mgmt-botservice\", \"AzureBotService\", \"bot management\", \"conversational AI\", \"\
      bot channels\"."
  azure-monitor-ingestion-py:
    action: execute
    risk: MEDIUM
    description: "Azure Monitor Ingestion SDK for Python. Use for sending custom logs to Log Analytics workspace via Logs
      Ingestion API.\nTriggers: \"azure-monitor-ingestion\", \"LogsIngestionClient\", \"custom logs\", \"DCR\", \"data collection
      rule\", \"Log Analytics\".\n"
  azure-storage-queue-py:
    action: execute
    risk: MEDIUM
    description: "Azure Queue Storage SDK for Python. Use for reliable message queuing, task distribution, and asynchronous
      processing.\nTriggers: \"queue storage\", \"QueueServiceClient\", \"QueueClient\", \"message queue\", \"dequeue\".\n"
  azure-appconfiguration-py:
    action: execute
    risk: MEDIUM
    description: "Azure App Configuration SDK for Python. Use for centralized configuration management, feature flags, and
      dynamic settings.\nTriggers: \"azure-appconfiguration\", \"AzureAppConfigurationClient\", \"feature flags\", \"configuration\"\
      , \"key-value settings\".\n"
  agents-v2-py:
    action: execute
    risk: MEDIUM
    description: "Maintain legacy initial-preview Foundry container agents built with Azure AI Projects.\nUse only for pre-refreshed
      hosted-agent implementations. For current hosted agents with\nResponses or Invocations protocols, use hosted-agents-v2-py.\n\
      Triggers: \"legacy container agent\", \"initial preview hosted agent\",\n\"pre-refreshed Foundry Agent\", \"legacy agent
      create_version\".\n"
  azure-ai-contentsafety-py:
    action: execute
    risk: MEDIUM
    description: "Azure AI Content Safety SDK for Python. Use for detecting harmful content in text and images with multi-severity
      classification.\nTriggers: \"azure-ai-contentsafety\", \"ContentSafetyClient\", \"content moderation\", \"harmful content\"\
      , \"text analysis\", \"image analysis\".\n"
  azure-ai-projects-py:
    action: execute
    risk: MEDIUM
    description: Build AI applications using the Azure AI Projects Python SDK (azure-ai-projects). Use when working with
      Foundry project clients, creating versioned agents with PromptAgentDefinition, running evaluations, managing 
      connections/deployments/datasets/indexes, or using OpenAI-compatible clients. This is the high-level Foundry SDK -
      for low-level agent operations, use azure-ai-agents-python skill.
  m365-agents-py:
    action: execute
    risk: MEDIUM
    description: "Microsoft 365 Agents SDK for Python. Build multichannel agents for Teams/M365/Copilot Studio with aiohttp
      hosting, AgentApplication routing, streaming responses, and MSAL-based auth. Triggers: \"Microsoft 365 Agents SDK\"\
      , \"microsoft_agents\", \"AgentApplication\", \"start_agent_process\", \"TurnContext\", \"Copilot Studio client\", \"\
      CloudAdapter\".\n"
  azure-keyvault-py:
    action: execute
    risk: MEDIUM
    description: "Azure Key Vault SDK for Python. Use for secrets, keys, and certificates management with secure storage.\n\
      Triggers: \"key vault\", \"SecretClient\", \"KeyClient\", \"CertificateClient\", \"secrets\", \"encryption keys\".\n"
  azure-monitor-query-py:
    action: search
    risk: READ-ONLY
    description: "Azure Monitor Query SDK for Python. Use for querying Log Analytics workspaces and Azure Monitor metrics.\n\
      Triggers: \"azure-monitor-query\", \"LogsQueryClient\", \"MetricsQueryClient\", \"Log Analytics\", \"Kusto queries\"\
      , \"Azure metrics\".\n"
  fastapi-router-py:
    action: execute
    risk: MEDIUM
    description: Create FastAPI routers with CRUD operations, authentication dependencies, and proper response models. 
      Use when building REST API endpoints, creating new routes, implementing CRUD operations, or adding authenticated 
      endpoints in FastAPI applications.
  azure-ai-translation-text-py:
    action: execute
    risk: MEDIUM
    description: "Azure AI Text Translation SDK for real-time text translation, transliteration, language detection, and dictionary
      lookup. Use for translating text content in applications.\nTriggers: \"text translation\", \"translator\", \"translate
      text\", \"transliterate\", \"TextTranslationClient\".\n"
  pydantic-models-py:
    action: execute
    risk: MEDIUM
    description: Create Pydantic models following the multi-model pattern with Base, Create, Update, Response, and InDB 
      variants. Use when defining API request/response schemas, database models, or data validation in Python 
      applications using Pydantic v2.
  azure-cosmos-py:
    action: execute
    risk: MEDIUM
    description: "Azure Cosmos DB SDK for Python (NoSQL API). Use for document CRUD, queries, containers, and globally distributed
      data.\nTriggers: \"cosmos db\", \"CosmosClient\", \"container\", \"document\", \"NoSQL\", \"partition key\".\n"
  azure-storage-file-datalake-py:
    action: execute
    risk: MEDIUM
    description: "Azure Data Lake Storage Gen2 SDK for Python. Use for hierarchical file systems, big data analytics, and
      file/directory operations.\nTriggers: \"data lake\", \"DataLakeServiceClient\", \"FileSystemClient\", \"ADLS Gen2\"\
      , \"hierarchical namespace\".\n"
  azure-mgmt-apimanagement-py:
    action: execute
    risk: MEDIUM
    description: "Azure API Management SDK for Python. Use for managing APIM services, APIs, products, subscriptions, and
