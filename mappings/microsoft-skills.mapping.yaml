  azure-containerregistry-py:
    action: execute
    risk: MEDIUM
    description: "Azure Container Registry SDK for Python. Use for managing container images, artifacts, and repositories.\n\
      Triggers: \"azure-containerregistry\", \"ContainerRegistryClient\", \"container images\", \"docker registry\", \"ACR\"\
