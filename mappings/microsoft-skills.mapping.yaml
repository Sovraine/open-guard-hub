      azd ai agent, or AIProjectClient HostedAgentDefinition.\nTriggers: \"hosted agent\", \"Foundry hosted agent\", \"Responses
      protocol\", \"Invocations protocol\",\n\"ResponsesAgentServerHost\", \"InvocationAgentServerHost\", \"ResponsesHostServer\"\
      ,\n\"HostedAgentDefinition\", \"agent.yaml\", \"azd ai agent\".\n"
  agent-framework-azure-ai-py:
    action: execute
    risk: MEDIUM
    description: Build Azure AI Foundry agents using the Microsoft Agent Framework Python SDK 
      (agent-framework-azure-ai). Use when creating persistent agents with AzureAIAgentsProvider, using hosted tools 
      (code interpreter, file search, web search), integrating MCP servers, managing conversation threads, or 
      implementing streaming responses. Covers function tools, structured outputs, and multi-tool agents.
  azure-eventgrid-py:
    action: execute
    risk: MEDIUM
    description: "Azure Event Grid SDK for Python. Use for publishing events, handling CloudEvents, and event-driven architectures.\n\
