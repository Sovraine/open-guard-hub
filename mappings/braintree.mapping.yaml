server: braintree
description: "Braintree payment processing"
version: "1.0.0"
license: CC-BY-SA-4.0
upstream:
  package: "braintree-mcp"
  registry: npm
  transport: stdio

tools:
  list_customers:
    action: list
    risk: READ-ONLY
    description: "List customers"
  get_customer:
    action: read
    risk: READ-ONLY
    description: "Get customer"
    target_from: customer_id
  create_customer:
    action: create
    risk: MEDIUM
    description: "Create customer"
    context_from:
      email: email
      first_name: first_name
  update_customer:
    action: update
    risk: MEDIUM
    description: "Update customer"
    target_from: customer_id
    context_from:
      fields: fields
  delete_customer:
    action: delete
    risk: HIGH
    description: "Delete customer"
    target_from: customer_id
  list_transactions:
    action: list
    risk: READ-ONLY
    description: "List transactions"
  get_transaction:
    action: read
    risk: READ-ONLY
    description: "Get transaction"
    target_from: transaction_id
  create_transaction:
    action: create
    risk: HIGH
    description: "Create transaction"
    context_from:
      customer_id: customer_id
      amount: amount
      payment_method_nonce: payment_method_nonce
  void_transaction:
    action: delete
    risk: HIGH
    description: "Void transaction"
    target_from: transaction_id
  refund_transaction:
    action: delete
    risk: MEDIUM
    description: "Refund transaction"
    target_from: transaction_id
  list_payment_methods:
    action: list
    risk: READ-ONLY
    description: "List payment methods"
    target_from: customer_id
  create_payment_method:
    action: create
    risk: MEDIUM
    description: "Create payment method"
    target_from: customer_id
    context_from:
      nonce: nonce
  delete_payment_method:
    action: delete
    risk: MEDIUM
    description: "Delete payment method"
    target_from: payment_method_id
