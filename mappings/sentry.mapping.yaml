server: sentry
description: "Sentry — error monitoring, issues, releases, source maps (26 tools)"
version: 1.0.0
license: CC-BY-SA-4.0
upstream:
  package: "@anthropic-ai/sentry-mcp-server"
  registry: npm
  transport: stdio
  command: "npx -y @anthropic-ai/sentry-mcp-server"
tools:
  # --- Issues ---
  list_issues:
    action: list
    risk: READ-ONLY
    description: "List issues for a project"
    target_from: project_slug
    context_from:
      organization: organization_slug
  get_issue_details:
    action: read
    risk: READ-ONLY
    description: "Get issue details"
    target_from: issue_id
  search_issues:
    action: search
    risk: READ-ONLY
    description: "Search issues with query"
    sql_mapping: false
    target_from: query
    context_from:
      organization: organization_slug
  update_issue:
    action: update
    risk: MEDIUM
    description: "Update issue status or assignment"
    target_from: issue_id
  resolve_issue:
    action: update
    risk: LOW
    description: "Resolve an issue"
    target_from: issue_id
  archive_issue:
    action: update
    risk: LOW
    description: "Archive an issue"
    target_from: issue_id
  assign_issue:
    action: update
    risk: LOW
    description: "Assign an issue to a user"
    target_from: issue_id
    context_from:
      assignee: assignee
  delete_issue:
    action: delete
    risk: HIGH
    description: "Delete an issue permanently"
    target_from: issue_id
  # --- Events ---
  get_issue_events:
    action: read
    risk: READ-ONLY
    description: "Get events for an issue"
    target_from: issue_id
  get_latest_event:
    action: read
    risk: READ-ONLY
    description: "Get the latest event for an issue"
    target_from: issue_id
  # --- Projects ---
  list_projects:
    action: list
    risk: READ-ONLY
    description: "List all projects"
  get_project:
    action: read
    risk: READ-ONLY
    description: "Get project details"
    target_from: project_slug
    context_from:
      organization: organization_slug
  # --- Organizations ---
  list_organizations:
    action: list
    risk: READ-ONLY
    description: "List all organizations"
  # --- Releases ---
  list_releases:
    action: list
    risk: READ-ONLY
    description: "List releases for a project"
    target_from: project_slug
    context_from:
      organization: organization_slug
  get_release:
    action: read
    risk: READ-ONLY
    description: "Get release details"
    target_from: version
    context_from:
      organization: organization_slug
  create_release:
    action: create
    risk: MEDIUM
    description: "Create a new release"
    target_from: version
    context_from:
      organization: organization_slug
  # --- Source Maps ---
  list_source_maps:
    action: list
    risk: READ-ONLY
    description: "List uploaded source map artifacts"
    target_from: release_version
  # --- Tags ---
  list_tags:
    action: list
    risk: READ-ONLY
    description: "List tags for an issue"
    target_from: issue_id
  get_tag_values:
    action: read
    risk: READ-ONLY
    description: "Get values for a tag"
    target_from: tag_key
    context_from:
      issue_id: issue_id
  # --- Replays ---
  list_replays:
    action: list
    risk: READ-ONLY
    description: "List session replays"
    target_from: project_slug
    context_from:
      organization: organization_slug
  get_replay:
    action: read
    risk: READ-ONLY
    description: "Get replay details"
    target_from: replay_id
  # --- Alerts ---
  list_alert_rules:
    action: list
    risk: READ-ONLY
    description: "List alert rules"
    target_from: project_slug
    context_from:
      organization: organization_slug
  # --- Teams ---
  list_teams:
    action: list
    risk: READ-ONLY
    description: "List teams in an organization"
    target_from: organization_slug
  # --- Docs ---
  search_docs:
    action: search
    risk: READ-ONLY
    description: "Search Sentry documentation"
    sql_mapping: false
    target_from: query
  # --- Performance ---
  get_transaction_stats:
    action: read
    risk: READ-ONLY
    description: "Get transaction performance stats"
    target_from: transaction
    context_from:
      project_slug: project_slug
  # --- Error Autofix ---
  get_autofix_state:
    action: read
    risk: READ-ONLY
    description: "Get autofix status for an issue"
    target_from: issue_id
