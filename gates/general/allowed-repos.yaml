# Open-Guard mapping: actions=["create","update"], targets=["pod"], verdict=DENY
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sallowedrepos
  annotations:
    metadata.gatekeeper.sh/title: "Allowed Repositories"
    metadata.gatekeeper.sh/version: 1.0.1
    description: >-
      Requires container images to begin with a string from the specified list.
spec:
  crd:
    spec:
      names:
        kind: K8sAllowedRepos
      validation:
        openAPIV3Schema:
          type: object
          properties:
            repos:
              description: List of allowed container image repository prefixes.
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sallowedrepos

        violation[{"msg": msg}] {
            container := input.review.object.spec.containers[_]
            not strings.any_prefix_match(container.image, input.parameters.repos)
            msg := sprintf("Container <%v> has an invalid image repo <%v>, allowed repos are %v", [container.name, container.image, input.parameters.repos])
        }

        violation[{"msg": msg}] {
            container := input.review.object.spec.initContainers[_]
            not strings.any_prefix_match(container.image, input.parameters.repos)
            msg := sprintf("Init container <%v> has an invalid image repo <%v>, allowed repos are %v", [container.name, container.image, input.parameters.repos])
        }

        violation[{"msg": msg}] {
            container := input.review.object.spec.ephemeralContainers[_]
            not strings.any_prefix_match(container.image, input.parameters.repos)
            msg := sprintf("Ephemeral container <%v> has an invalid image repo <%v>, allowed repos are %v", [container.name, container.image, input.parameters.repos])
        }
