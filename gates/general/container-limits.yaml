# Open-Guard mapping: actions=["create","update"], targets=["pod"], verdict=DENY
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8scontainerlimits
  annotations:
    metadata.gatekeeper.sh/title: "Container Limits"
    metadata.gatekeeper.sh/version: 1.0.1
    description: >-
      Requires containers to have memory and CPU limits set and within
      a specified maximum amount.
spec:
  crd:
    spec:
      names:
        kind: K8sContainerLimits
      validation:
        openAPIV3Schema:
          type: object
          properties:
            exemptImages:
              description: Images excluded from enforcement.
              type: array
              items:
                type: string
            cpu:
              description: Maximum allowed CPU limit.
              type: string
            memory:
              description: Maximum allowed memory limit.
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8scontainerlimits

        import data.lib.exclude_update.is_update
        import data.lib.exempt_container.is_exempt

        violation[{"msg": msg}] {
            not is_update(input)
            c := input_containers[_]
            not is_exempt(c)
            not c.resources.limits.memory
            msg := sprintf("Container <%v> has no memory limit", [c.name])
        }

        violation[{"msg": msg}] {
            not is_update(input)
            c := input_containers[_]
            not is_exempt(c)
            not c.resources.limits.cpu
            msg := sprintf("Container <%v> has no CPU limit", [c.name])
        }

        input_containers[c] {
            c := input.review.object.spec.containers[_]
        }

        input_containers[c] {
            c := input.review.object.spec.initContainers[_]
        }
