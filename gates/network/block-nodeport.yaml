# Open-Guard mapping: actions=["create"], targets=["service"], verdict=DENY
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblocknodeport
  annotations:
    metadata.gatekeeper.sh/title: "Block NodePort Services"
    metadata.gatekeeper.sh/version: 1.0.0
    description: >-
      Disallows all Services with type NodePort. NodePort services expose
      ports directly on cluster nodes, which is a security risk in production.
spec:
  crd:
    spec:
      names:
        kind: K8sBlockNodePort
      validation:
        openAPIV3Schema:
          type: object
          description: Disallows all Services with type NodePort.
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblocknodeport

        violation[{"msg": msg}] {
            input.review.kind.kind == "Service"
            input.review.object.spec.type == "NodePort"
            msg := sprintf("Service <%v> is of type NodePort, which is not allowed", [input.review.object.metadata.name])
        }
