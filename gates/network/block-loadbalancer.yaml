# License: Apache-2.0 (CNCF)
# Open-Guard mapping: actions=["create"], targets=["service"], verdict=DENY
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblockloadbalancer
  annotations:
    metadata.gatekeeper.sh/title: "Block LoadBalancer Services"
    metadata.gatekeeper.sh/version: 1.0.0
    description: >-
      Disallows all Services with type LoadBalancer. Use Ingress controllers
      instead for external access.
spec:
  crd:
    spec:
      names:
        kind: K8sBlockLoadBalancer
      validation:
        openAPIV3Schema:
          type: object
          description: Disallows all Services with type LoadBalancer.
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblockloadbalancer

        violation[{"msg": msg}] {
            input.review.kind.kind == "Service"
            input.review.object.spec.type == "LoadBalancer"
            msg := sprintf("Service <%v> is of type LoadBalancer, which is not allowed", [input.review.object.metadata.name])
        }
