taxonomy_version: "2026.03.1"
sub_sector: travel
sector: hospitality

verbs:
  cancel-booking:
    risk: MEDIUM
    description: "Cancel a travel booking or reservation"
  issue-refund:
    risk: HIGH
    description: "Issue a refund for a travel booking"
  override-cancellation-policy:
    risk: HIGH
    description: "Override the standard cancellation policy for a booking"
