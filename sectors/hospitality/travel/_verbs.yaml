  blacklist-traveler:
    risk: HIGH
    description: "Blacklist a traveler from booking services"
    requires_approval: true
  modify-itinerary:
    risk: MEDIUM
    description: "Modify an existing travel itinerary"
  upgrade-class:
    risk: LOW
    description: "Upgrade a traveler to a higher service class"
